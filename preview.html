<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0e0e10" />
<title>Aravt · Задачи (preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:'#0e0e10', panel:'#161618', panel2:'#1c1c1f',
          cream:'#e8e6e1', muted:'#9a9893', dim:'#6a6864',
          done:'#5fa888',
        },
        fontFamily: {
          sans:['Golos Text','-apple-system','sans-serif'],
          mono:['JetBrains Mono','monospace'],
        },
      },
    },
  };
</script>
<style>
  :root{--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12)}
  *{-webkit-tap-highlight-color:transparent}
  body{background:#0e0e10}
  .brd{border:1px solid var(--line)}
  .brd2{border:1px solid var(--line2)}
  ::selection{background:#e8e6e1;color:#000}
  .seg::-webkit-scrollbar,.chips::-webkit-scrollbar{display:none}
  .exp{transition:grid-template-rows .28s cubic-bezier(.2,.8,.2,1)}
</style>
</head>
<body class="font-sans text-cream antialiased">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ===== Метаданные статусов/приоритетов/категорий (как в реальном App.jsx) ===== */
const STATUS = {
  pending:    { label:'В очереди', dot:'#6a6864', order:0 },
  inprogress: { label:'В работе',  dot:'#e8e6e1', order:1 },
  done:       { label:'Готово',    dot:'#5fa888', order:2 },
};
const NEXT = { pending:'inprogress', inprogress:'done', done:'pending' };
const PRIO = {
  high:   { label:'Высокий', color:'#e05a4d' },
  medium: { label:'Средний', color:'#d9a23b' },
  low:    { label:'Низкий',  color:'#6b6f76' },
};
const CAT = { work:'Работа', personal:'Личное' };

/* ===== Демо-данные (в реальном приложении приходят из Supabase) ===== */
const MOCK = [
  { id:'1',  title:'Мурат ага — Клинкер', description:'Решение по переработке клинкера, вводные данные ожидаются.', status:'pending', priority:'high', category:'work', tags:['клинкер','переработка'] },
  { id:'2',  title:'Aravt — Внутренняя платформа', description:'Workflow для каждой позиции сотрудников, интеграция аналитики, подключить Владимира, использовать Claude для распределения задач.', status:'inprogress', priority:'high', category:'work', tags:['платформа','автоматизация','аналитика'] },
  { id:'3',  title:'КГМ-трейд — 2000 т серы', description:'Гранулированная сера, директор Дмитрий. Нурлан платит 100% предоплатой, КГМ-трейд — по факту отгрузки.', status:'inprogress', priority:'medium', category:'work', tags:['трейдинг','сера'] },
  { id:'4',  title:'Удобрения Алишер → Кайрат', description:'Получить от Алишера цены, ставки, объёмы для сельхозника Кайрата.', status:'pending', priority:'medium', category:'work', tags:['удобрения','трейдинг'] },
  { id:'5',  title:'АКК — Заявка (Салтанат)', description:'Салтанат готовит заявку на финансирование в Аграрную кредитную корпорацию.', status:'done', priority:'medium', category:'work', tags:['финансирование','заявка'] },
  { id:'6',  title:'Бурундай — Аналитика', description:'Данные от Геллама Уралхановича (ген. директор). Финмодель, сценарии окупаемости, стратегическое решение о входе, своё оборудование в аренду.', status:'pending', priority:'high', category:'work', tags:['аналитика','финмодель'] },
  { id:'7',  title:'Далянский проект — Презентация', description:'Завод аминокислот 500 га Вишнёвка, купить элеватор в Боровом, логистика Алматы → Бурундай, экспорт в Китай и Европу.', status:'pending', priority:'high', category:'work', tags:['презентация','экспорт'] },
  { id:'8',  title:'EcoSave — Консорциальный договор', description:'Подписать договор совместной деятельности. Запросить финотчётность Bioscience ES и договор по гранту Фонда науки.', status:'inprogress', priority:'high', category:'work', tags:['договор','юридическое'] },
  { id:'9',  title:'Дубай — Анализ открытия компании', description:'1-я стадия открытия пройдена, проект заморожен. Проанализировать все проекты холдинга, выбрать 3 направления, разработать стратегию.', status:'pending', priority:'high', category:'work', tags:['стратегия','анализ'] },
  { id:'10', title:'Флиппинг домов', description:'Изучить: купить или арендовать дом, сделать ремонт, сдавать в консульство. Проработать экономику и механику.', status:'pending', priority:'low', category:'work', tags:['недвижимость'] },
  { id:'11', title:'PriceGen / Any Labs (Идрис)', description:'Стартап с другом Идрисом — динамическое и статистическое ценообразование.', status:'inprogress', priority:'medium', category:'personal', tags:['стартап','ценообразование'] },
  { id:'12', title:'Проект с Женисом', description:'Сосед Женис, снабженец компании «Свой дом». Потенциальное партнёрство, детали уточнить.', status:'pending', priority:'low', category:'personal', tags:['партнёрство'] },
  { id:'13', title:'Ободья — Кирилл', description:'Коллаборация с заводом в Китае, дилерство в Казахстане и России, контакты Ержан и Костя.', status:'inprogress', priority:'medium', category:'personal', tags:['китай','дилерство'] },
];

/* ===== Иконки ===== */
const Check = (p)=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0e0e10" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 6 9 17l-5-5"/></svg>;
const Chevron = ({open})=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{transition:'transform .25s',transform:open?'rotate(180deg)':'none',opacity:.55}}><path d="m6 9 6 6 6-6"/></svg>;
const Live = ()=><span className="inline-flex items-center gap-1.5 text-[11px] text-done"><span className="w-1.5 h-1.5 rounded-full bg-done" style={{boxShadow:'0 0 8px #5fa888'}}></span>realtime</span>;

/* ===== Карточка ===== */
function Card({ t, onToggle }){
  const [open, setOpen] = useState(false);
  const s = STATUS[t.status];
  return (
    <div className="bg-panel brd rounded-2xl overflow-hidden">
      <div className="flex gap-3 p-4 cursor-pointer" onClick={()=>setOpen(o=>!o)}>
        <button onClick={(e)=>{e.stopPropagation();onToggle(t);}}
          className="flex-none w-6 h-6 mt-0.5 rounded-full grid place-items-center transition active:scale-90"
          style={{
            border: t.status==='pending' ? '1.8px solid rgba(255,255,255,.12)' : '1.8px solid '+s.dot,
            background: t.status==='done' ? s.dot : 'transparent',
          }}>
          {t.status==='inprogress' && <span className="w-2 h-2 rounded-full" style={{background:s.dot}}></span>}
          {t.status==='done' && <Check/>}
        </button>

        <div className="flex-1 min-w-0">
          <h3 className={"text-[15.5px] font-medium leading-snug tracking-tight break-words "+(t.status==='done'?'line-through text-muted decoration-dim':'')}>{t.title}</h3>
          <div className="flex flex-wrap items-center gap-x-2 gap-y-1 mt-2">
            <span className="inline-flex items-center gap-1.5 text-[12px] text-muted">
              <span className="w-1.5 h-1.5 rounded-full" style={{background:s.dot}}></span>{s.label}
            </span>
            {t.tags.slice(0,2).map((tg,i)=><span key={i} className="font-mono text-[11.5px] text-dim">#{tg}</span>)}
            {t.tags.length>2 && <span className="text-[11.5px] text-dim">+{t.tags.length-2}</span>}
          </div>
        </div>

        <div className="flex-none flex flex-col items-end gap-2.5 pt-0.5">
          <span className="w-2.5 h-2.5 rounded-full" title={PRIO[t.priority].label}
            style={{background:PRIO[t.priority].color, boxShadow:t.priority==='high'?'0 0 9px -1px '+PRIO[t.priority].color:'none'}}></span>
          <Chevron open={open}/>
        </div>
      </div>

      <div className="exp grid" style={{gridTemplateRows: open?'1fr':'0fr'}}>
        <div className="overflow-hidden">
          <div className="px-4 pb-4 pl-[52px]">
            <p className="text-[14px] leading-relaxed text-muted">{t.description}</p>
            <div className="flex flex-wrap gap-2 mt-3">
              {t.tags.map((tg,i)=><span key={i} className="font-mono text-[12px] text-muted bg-panel2 brd rounded-md px-2 py-1">#{tg}</span>)}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ===== Приложение ===== */
function App(){
  const [tasks, setTasks] = useState(MOCK);
  const [fStatus, setFStatus] = useState('all');
  const [fCat, setFCat] = useState('all');
  const [fPrio, setFPrio] = useState('all');

  const toggle = (t)=> setTasks(ts=>ts.map(x=>x.id===t.id?{...x,status:NEXT[x.status]}:x));

  const counts = useMemo(()=>{
    const c = { pending:0, inprogress:0, done:0 };
    tasks.forEach(t=>{ c[t.status]++; });
    return c;
  }, [tasks]);
  const pct = tasks.length ? Math.round(counts.done/tasks.length*100) : 0;

  const filtered = useMemo(()=> tasks.filter(t=>
    (fStatus==='all'||t.status===fStatus) &&
    (fCat==='all'||t.category===fCat) &&
    (fPrio==='all'||t.priority===fPrio)
  ), [tasks,fStatus,fCat,fPrio]);

  const groups = ['work','personal']
    .map(c=>({ key:c, label:CAT[c], items:filtered.filter(t=>t.category===c) }))
    .filter(g=>g.items.length);

  return (
    <div className="max-w-[640px] mx-auto px-[18px] pb-24">
      {/* Header */}
      <header className="sticky top-0 z-30 pt-[18px] pb-3.5" style={{background:'linear-gradient(#0e0e10 72%,rgba(14,14,16,0))'}}>
        <div className="flex items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <div className="w-[30px] h-[30px] rounded-lg bg-cream text-black grid place-items-center font-bold text-base tracking-tight">A</div>
            <div>
              <h1 className="text-[18px] font-semibold tracking-tight leading-none">Задачи</h1>
              <div className="font-mono text-[11px] text-dim mt-1 tracking-wider">ARAVT HOLDING</div>
            </div>
          </div>
          <div className="text-right">
            <div className="text-[13px] text-muted tabular-nums"><b className="text-cream font-semibold">{counts.done}</b> из {tasks.length} · {pct}%</div>
            <div className="mt-1 flex justify-end"><Live/></div>
          </div>
        </div>
        <div className="mt-3.5 h-1.5 rounded-full bg-panel2 brd overflow-hidden">
          <i className="block h-full bg-cream rounded-full" style={{width:pct+'%', transition:'width .5s cubic-bezier(.2,.8,.2,1)'}}></i>
        </div>
        <div className="mt-3 flex items-center gap-4 text-[12.5px] text-muted">
          {Object.keys(STATUS).map(k=>(
            <span key={k} className="inline-flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full" style={{background:STATUS[k].dot}}></span>
              {STATUS[k].label}<b className="text-cream font-semibold tabular-nums ml-0.5">{counts[k]}</b>
            </span>
          ))}
        </div>
      </header>

      {/* Filters */}
      <div className="flex flex-col gap-2.5 mt-3">
        <div className="seg flex bg-panel brd rounded-xl p-1 gap-1 overflow-x-auto">
          {[['all','Все'],['inprogress','В работе'],['pending','В очереди'],['done','Готово']].map(([k,l])=>(
            <button key={k} onClick={()=>setFStatus(k)}
              className={"flex-1 whitespace-nowrap text-[13px] font-medium px-3 py-1.5 rounded-lg transition "+(fStatus===k?'bg-panel2 text-cream':'text-muted')}>{l}</button>
          ))}
        </div>
        <div className="chips flex gap-2 overflow-x-auto">
          {[['all','Категория'],['work','Работа'],['personal','Личное']].map(([k,l])=>(
            <button key={k} onClick={()=>setFCat(k)}
              className={"flex-none text-[13px] px-3 py-1.5 rounded-full transition "+(fCat===k?'brd2 text-cream bg-panel2':'brd text-muted bg-panel')}>{l}</button>
          ))}
          <span className="flex-none w-px bg-white/10 my-0.5"></span>
          {[['all','Приоритет'],['high','Высокий'],['medium','Средний'],['low','Низкий']].map(([k,l])=>(
            <button key={k} onClick={()=>setFPrio(k)}
              className={"flex-none inline-flex items-center gap-1.5 text-[13px] px-3 py-1.5 rounded-full transition "+(fPrio===k?'brd2 text-cream bg-panel2':'brd text-muted bg-panel')}>
              {k!=='all' && <span className="w-1.5 h-1.5 rounded-full" style={{background:PRIO[k].color}}></span>}{l}
            </button>
          ))}
        </div>
      </div>

      {/* Groups */}
      {filtered.length===0 ? (
        <div className="text-center py-16 text-dim"><div className="text-4xl opacity-50 mb-2">∅</div>Ничего не найдено</div>
      ) : groups.map(g=>(
        <section className="mt-6" key={g.key}>
          <div className="flex items-center gap-2.5 mb-3 mx-1">
            <h2 className="text-[13px] font-semibold tracking-wider uppercase text-muted">{g.label}</h2>
            <span className="font-mono text-[12px] text-dim tabular-nums">{g.items.length}</span>
            <span className="flex-1 h-px bg-white/[.07]"></span>
          </div>
          <div className="flex flex-col gap-2.5">
            {g.items.map(t=><Card key={t.id} t={t} onToggle={toggle}/>)}
          </div>
        </section>
      ))}

      <div className="mt-10 text-center text-[12px] text-dim leading-relaxed px-6">
        Это визуальный прообраз UI. В реальном приложении задачи приходят из Supabase и
        обновляются мгновенно, когда Claude добавляет их голосом через MCP.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
